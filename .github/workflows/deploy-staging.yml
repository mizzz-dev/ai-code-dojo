name: deploy-staging

on:
  push:
    branches: [develop]
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test:unit
      - run: pnpm test:integration
      - run: pnpm schema:validate
      - run: pnpm build

  migrate:
    needs: verify
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run migration (staging)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          # TODO: 実DB migrationコマンドへ差し替える。
          # 例: pnpm db:migrate -- --env staging
          node scripts/deploy/deploy.mjs migration-staging

  deploy:
    needs: migrate
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Deploy (staging)
        env:
          DEPLOY_TARGET: ${{ vars.DEPLOY_TARGET }}
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          # TODO: 実デプロイ先のCLI/Actionに差し替える。
          node scripts/deploy/deploy.mjs staging
