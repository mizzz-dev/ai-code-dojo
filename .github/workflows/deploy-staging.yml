name: deploy-staging

on:
  push:
    branches: [develop]
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test:unit
      - run: npm run test:integration
      - run: npm run schema:validate
      - run: npm run build

  deploy:
    needs: verify
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Deploy (staging)
        env:
          DEPLOY_TARGET: ${{ vars.DEPLOY_TARGET }}
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          echo "DEPLOY_TARGET=${DEPLOY_TARGET:-undefined}"
          node scripts/deploy/deploy.mjs staging
