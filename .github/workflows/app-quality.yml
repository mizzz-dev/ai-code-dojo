name: app-quality

on:
  pull_request:

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.13.1

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Quality gates
        run: |
          pnpm lint
          pnpm typecheck
          pnpm test:unit
          pnpm schema:validate
          pnpm build
